name: Build Pacman Repository

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual triggers

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm git fontforge unzip

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create build user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Build all packages
        run: |
          mkdir -p /tmp/repo
          chown builder:builder /tmp/repo

          for dir in */; do
            if [[ -f "$dir/PKGBUILD" ]]; then
              echo "=========================================="
              echo "Building: $dir"
              echo "=========================================="

              cp -r "$dir" "/tmp/build-$dir"
              chown -R builder:builder "/tmp/build-$dir"

              su builder -c "cd /tmp/build-$dir && makepkg -s --noconfirm"

              cp /tmp/build-$dir/*.pkg.tar.zst /tmp/repo/
            fi
          done

      - name: Generate pacman repository database
        run: |
          cd /tmp/repo
          repo-add custom.db.tar.gz *.pkg.tar.zst

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/repo

  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
